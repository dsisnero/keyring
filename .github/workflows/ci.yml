name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libraries
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsodium-dev libsecret-1-dev libglib2.0-dev
            gcc -c -fPIC src/keyring/schema_shim.c -o src/keyring/schema_shim.o $(pkg-config --cflags libsecret-1)
            ;;
          macos-latest)
            brew install libsodium || true
            ;;
          windows-latest)
            vcpkg install
            ;;
        esac

    - name: Install shard dependencies
      shell: bash
      env:
        LIBSODIUM_INSTALL: "0"
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            shards install --skip-postinstall 2>&1 | grep -v "Could not find executable" || true
            ;;
          *)
            shards install
            ;;
        esac

    - name: Format check
      if: matrix.os != 'windows-latest'
      run: crystal tool format --check src spec
      if: matrix.os == 'macos-latest'
      run: crystal spec

    - name: Run tests (Linux/Windows - exclude secret service/kwallet)
      if: matrix.os != 'macos-latest'
      run: crystal spec spec/keyring/backend_contract_spec.cr spec/keyring/chainer_backend_spec.cr spec/keyring/circuit_breaker_spec.cr spec/keyring/cli_spec.cr spec/keyring/config_spec.cr spec/keyring/credential_spec.cr spec/keyring/encryption_spec.cr spec/keyring/file_backend_spec.cr spec/keyring/metrics_spec.cr spec/keyring/null_fail_backend_spec.cr spec/keyring/platform_spec.cr spec/keyring/reliability_spec.cr spec/keyring/retryable_spec.cr spec/keyring/backend_priority_spec.cr spec/keyring/backend_metadata_spec.cr spec/integration/end_to_end_spec.cr

    - name: Build binary
      run: shards build --release

    - name: Determine binary name
      id: bin-name
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            echo "name=keyring_cr.exe" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "name=keyring_cr" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/${{ steps.bin-name.outputs.name }}
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y libsodium-dev libsecret-1-dev libglib2.0-dev
        gcc -c -fPIC src/keyring/schema_shim.c -o src/keyring/schema_shim.o $(pkg-config --cflags libsecret-1)

    - name: Install shard dependencies
      env:
        LIBSODIUM_INSTALL: "0"
      run: shards install

    - name: Format check
      run: crystal tool format --check src spec

    - name: Run Ameba
      run: shards build && crystal run lib/ameba/bin/ameba.cr -- --fail-level Error

  binaries:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Binary (${{ matrix.os }})

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libraries
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsodium-dev libsecret-1-dev libglib2.0-dev
            gcc -c -fPIC src/keyring/schema_shim.c -o src/keyring/schema_shim.o $(pkg-config --cflags libsecret-1)
            ;;
          macos-latest)
            brew install libsodium || true
            ;;
          windows-latest)
            vcpkg install
            ;;
        esac

    - name: Install shard dependencies
      shell: bash
      env:
        LIBSODIUM_INSTALL: "0"
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            shards install --skip-postinstall 2>&1 | grep -v "Could not find executable" || true
            ;;
          *)
            shards install
            ;;
        esac

    - name: Build release binary
      run: shards build --release

    - name: Determine binary name
      id: bin-name-rel
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            echo "name=keyring_cr.exe" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "name=keyring_cr" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/${{ steps.bin-name-rel.outputs.name }}
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [binaries]
    runs-on: ubuntu-latest
    name: Create release

    steps:
    - uses: actions/checkout@v4

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false

  kwallet:
    runs-on: ubuntu-latest
    name: KWallet backend tests
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install KDE KWallet deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libkf5wallet-bin \
          qdbus-qt5 \
          dbus \
          dbus-x11 \
          libsodium-dev

    - name: Install shards
      run: shards install --skip-postinstall

    - name: Start D-Bus and KWallet
      run: |
        export XDG_RUNTIME_DIR=/tmp/runtime-root
        mkdir -p "$XDG_RUNTIME_DIR"
        chmod 700 "$XDG_RUNTIME_DIR"
        DBUS_ADDR=$(dbus-daemon --session --print-address --fork)
        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_ADDR" >> $GITHUB_ENV
        echo "D-Bus: $DBUS_ADDR"
        sleep 1
        export KDE_FULL_SESSION=false
        export QT_QPA_PLATFORM=offscreen
        kwalletd5 &
        sleep 2
        qdbus org.kde.kwalletd5 /modules/kwalletd5 org.kde.KWallet.isEnabled 2>/dev/null && echo "KWallet available" || echo "KWallet not detected"

    - name: Run KWallet tests
      run: crystal spec spec/keyring/kwallet_backend_spec.cr

