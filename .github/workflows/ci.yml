name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crystal: ["latest"]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test on ${{ matrix.os }} with Crystal ${{ matrix.crystal }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Install dependencies
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            shards install --skip-postinstall
            ;;
          *)
            shards install
            ;;
        esac

    - name: Cache shards
      uses: actions/cache@v4
      with:
        path: lib
        key: ${{ runner.os }}-crystal-${{ matrix.crystal }}-shards-${{ hashFiles('shard.lock') }}
        restore-keys: |
          ${{ runner.os }}-crystal-${{ matrix.crystal }}-shards-

    - name: Platform-specific setup
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            # Install libsecret for Linux backend tests
            sudo apt-get update
            sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
            # Start DBus and GNOME Keyring for testing
            eval "$(dbus-launch --sh-syntax)"
            mkdir -p ~/.local/share/keyrings
            /usr/bin/gnome-keyring-daemon --start --components=secrets
            export $(gnome-keyring-daemon --start)
            ;;
          macos-latest)
            # macOS has Security.framework available by default
            # No additional setup needed for keyring tests
            ;;
          windows-latest)
            # Windows has Credential Manager available by default
            # No additional setup needed for win32cr compilation
            ;;
        esac

    - name: Format check
      run: crystal tool format --check

    - name: Run Ameba (lint)
      run: shards build && crystal run lib/ameba/bin/ameba.cr -- --fail-level Error

    - name: Run tests
      env:
        KEYRING_TEST_MODE: "true"
      run: crystal spec

    - name: Build project
      run: shards build

  lint:
    runs-on: ubuntu-latest
    name: Lint and format

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install --development

    - name: Format check
      run: crystal tool format --check

    - name: Run Ameba
      run: shards build && crystal run lib/ameba/bin/ameba.cr -- --fail-level Error

  security:
    runs-on: ubuntu-latest
    name: Security scan

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install

    - name: Check for secrets
      uses: gitleaks/gitleaks-action@v2
      with:
        config-path: .gitleaks.toml

    - name: Dependency audit
      run: |
        # Check for known vulnerabilities in dependencies
        shards list
        # TODO: Add Crystal-specific dependency vulnerability check when available

  coverage:
    runs-on: ubuntu-latest
    name: Code coverage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install --development

    - name: Install libsecret for tests
      run: |
        sudo apt-get update
        sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
        eval "$(dbus-launch --sh-syntax)"
        mkdir -p ~/.local/share/keyrings
        /usr/bin/gnome-keyring-daemon --start --components=secrets
        export $(gnome-keyring-daemon --start)

    - name: Generate coverage
      env:
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/1000/bus"
      run: |
        # Generate coverage report (requires crystal tool to support coverage)
        # crystal spec --coverage
        # crystal tool coverage
        # For now, just run tests
        crystal spec --exclude-tag integration

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/coverage.json
        fail_ci_if_error: false

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, security]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Release build on ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            shards install --skip-postinstall
            ;;
          *)
            shards install --skip-postinstall
            ;;
        esac

    - name: Platform-specific setup for building
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsecret-1-dev libsodium-dev
            ;;
          macos-latest)
            brew install libsodium
            ;;
          windows-latest)
            # libsodium must be pre-installed or available via vcpkg
            ;;
        esac

    - name: Build release binary
      run: shards build --release

    - name: Determine binary name
      id: binary-name
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest|macos-latest)
            echo "binary_name=keyring_cr" >> $GITHUB_OUTPUT
            ;;
          windows-latest)
            echo "binary_name=keyring_cr.exe" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/${{ steps.binary-name.outputs.binary_name }}
        retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    name: Create release

    steps:
    - uses: actions/checkout@v4

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false

  kwallet:
    runs-on: ubuntu-latest
    name: KWallet backend tests
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install KDE KWallet deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libkf5wallet-bin \
          qdbus-qt5 \
          dbus \
          dbus-x11 \
          libsodium-dev

    - name: Install shards
      run: shards install --skip-postinstall

    - name: Start D-Bus and KWallet
      run: |
        export XDG_RUNTIME_DIR=/tmp/runtime-root
        mkdir -p "$XDG_RUNTIME_DIR"
        chmod 700 "$XDG_RUNTIME_DIR"
        DBUS_ADDR=$(dbus-daemon --session --print-address --fork)
        echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_ADDR" >> $GITHUB_ENV
        echo "D-Bus: $DBUS_ADDR"
        sleep 1
        # Start KWallet headless
        export KDE_FULL_SESSION=false
        export QT_QPA_PLATFORM=offscreen
        kwalletd5 &
        sleep 2
        # Check if KWallet responded
        qdbus org.kde.kwalletd5 /modules/kwalletd5 org.kde.KWallet.isEnabled 2>/dev/null && echo "KWallet available" || echo "KWallet not detected"

    - name: Run KWallet tests
      run: crystal spec spec/keyring/kwallet_backend_spec.cr

  binaries:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Binary artifact (${{ matrix.os }})

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          windows-latest)
            shards install --development --skip-postinstall
            ;;
          *)
            shards install --development --skip-postinstall
            ;;
        esac

    - name: Platform-specific setup for building
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsecret-1-dev libsodium-dev
            ;;
          macos-latest)
            brew install libsodium || true
            ;;
          windows-latest)
            # libsodium must be pre-installed or available via vcpkg
            ;;
        esac

    - name: Build binary
      run: shards build --release

    - name: Determine binary name
      id: binary-name
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest|macos-latest)
            echo "binary_name=keyring_cr" >> $GITHUB_OUTPUT
            ;;
          windows-latest)
            echo "binary_name=keyring_cr.exe" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/${{ steps.binary-name.outputs.binary_name }}
        retention-days: 30