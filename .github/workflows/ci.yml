name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crystal: ["latest"]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test on ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Install system libsodium
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsodium-dev libsecret-1-dev
            ;;
          macos-latest)
            brew install libsodium || true
            ;;
          windows-latest)
            # libsodium via vcpkg (pre-installed on GitHub runners)
            ;;
        esac

    - name: Install shard dependencies
      env:
        LIBSODIUM_INSTALL: "0"
      run: shards install

    - name: Cache shards
      uses: actions/cache@v4
      with:
        path: lib
        key: ${{ runner.os }}-crystal-shards-${{ hashFiles('shard.lock') }}
        restore-keys: |
          ${{ runner.os }}-crystal-shards-

    - name: Format check
      run: crystal tool format --check src spec

    - name: Run tests
      run: crystal spec

    - name: Build binary
      run: shards build --release

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/keyring_cr${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libsodium
      run: |
        sudo apt-get update
        sudo apt-get install -y libsodium-dev

    - name: Install shard dependencies
      env:
        LIBSODIUM_INSTALL: "0"
      run: shards install

    - name: Format check
      run: crystal tool format --check src spec

    - name: Run Ameba
      run: shards build && crystal run lib/ameba/bin/ameba.cr -- --fail-level Error

  security:
    runs-on: ubuntu-latest
    name: Security scan

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libsodium
      run: |
        sudo apt-get update
        sudo apt-get install -y libsodium-dev

    - name: Install shard dependencies
      env:
        LIBSODIUM_INSTALL: "0"
      run: shards install

    - name: Check for secrets
      uses: gitleaks/gitleaks-action@v2
      with:
        config-path: .gitleaks.toml

    - name: Dependency audit
      run: shards list

  binaries:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Binary (${{ matrix.os }})

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install system libsodium
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            sudo apt-get update
            sudo apt-get install -y libsodium-dev libsecret-1-dev
            ;;
          macos-latest)
            brew install libsodium || true
            ;;
          windows-latest)
            ;;
        esac

    - name: Install shard dependencies
      env:
        LIBSODIUM_INSTALL: "0"
      run: shards install

    - name: Build release binary
      run: shards build --release

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring_cr-${{ matrix.os }}
        path: bin/keyring_cr${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [binaries]
    runs-on: ubuntu-latest
    name: Create release

    steps:
    - uses: actions/checkout@v4

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
