name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crystal: ["1.14.0", "latest"]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Test on ${{ matrix.os }} with Crystal ${{ matrix.crystal }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Install dependencies
      run: shards install

    - name: Cache shards
      uses: actions/cache@v4
      with:
        path: lib
        key: ${{ runner.os }}-crystal-${{ matrix.crystal }}-shards-${{ hashFiles('shard.lock') }}
        restore-keys: |
          ${{ runner.os }}-crystal-${{ matrix.crystal }}-shards-

    - name: Platform-specific setup
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            # Install libsecret for Linux backend tests
            sudo apt-get update
            sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
            # Start DBus and GNOME Keyring for testing
            eval "$(dbus-launch --sh-syntax)"
            mkdir -p ~/.local/share/keyrings
            /usr/bin/gnome-keyring-daemon --start --components=secrets
            export $(gnome-keyring-daemon --start)
            ;;
          macos-latest)
            # macOS has Security.framework available by default
            # No additional setup needed for keyring tests
            ;;
          windows-latest)
            # Windows has Credential Manager available by default
            # No additional setup needed for win32cr compilation
            ;;
        esac

    - name: Format check
      run: crystal tool format --check

    - name: Run Ameba (lint)
      run: shards build && ameba --fail-level Error

    - name: Run tests
      env:
        # For macOS tests, avoid permission dialogs in CI
        KEYRING_TEST_MODE: "true"
        # For Linux tests, ensure secret service is available
        DBUS_SESSION_BUS_ADDRESS: ${{ matrix.os == 'ubuntu-latest' && 'unix:path=/run/user/1000/bus' || '' }}
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            # Run tests with GNOME Keyring available
            crystal spec --exclude-tag integration
            ;;
          macos-latest)
            # Run macOS tests (excluding Linux-specific tests)
            crystal spec --exclude-tag linux
            ;;
          windows-latest)
            # Run Windows tests (excluding Linux/macOS-specific tests)
            crystal spec --exclude-tag linux --exclude-tag darwin
            ;;
          *)
            crystal spec
            ;;
        esac

    - name: Build project
      run: shards build

  lint:
    runs-on: ubuntu-latest
    name: Lint and format

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install

    - name: Format check
      run: crystal tool format --check

    - name: Run Ameba
      run: shards build && ameba --fail-level Error

  security:
    runs-on: ubuntu-latest
    name: Security scan

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install

    - name: Check for secrets
      uses: gitleaks/gitleaks-action@v2
      with:
        config-path: .gitleaks.toml

    - name: Dependency audit
      run: |
        # Check for known vulnerabilities in dependencies
        shards list
        # TODO: Add Crystal-specific dependency vulnerability check when available

  coverage:
    runs-on: ubuntu-latest
    name: Code coverage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: latest

    - name: Install dependencies
      run: shards install

    - name: Install libsecret for tests
      run: |
        sudo apt-get update
        sudo apt-get install -y libsecret-1-dev gnome-keyring dbus-x11
        eval "$(dbus-launch --sh-syntax)"
        mkdir -p ~/.local/share/keyrings
        /usr/bin/gnome-keyring-daemon --start --components=secrets
        export $(gnome-keyring-daemon --start)

    - name: Generate coverage
      env:
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/1000/bus"
      run: |
        # Generate coverage report (requires crystal tool to support coverage)
        # crystal spec --coverage
        # crystal tool coverage
        # For now, just run tests
        crystal spec --exclude-tag integration

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/coverage.json
        fail_ci_if_error: false

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint, security]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        crystal: ["1.14.0", "latest"]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }} with Crystal ${{ matrix.crystal }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Crystal
      uses: crystal-lang/install-crystal@v1
      with:
        crystal: ${{ matrix.crystal }}

    - name: Install dependencies
      run: shards install

    - name: Platform-specific setup for building
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest)
            # Install libsecret for Linux backend compilation
            sudo apt-get update
            sudo apt-get install -y libsecret-1-dev
            ;;
          macos-latest)
            # macOS has Security.framework available by default
            # No additional setup needed for compilation
            ;;
          windows-latest)
            # Windows has Credential Manager available by default
            # No additional setup needed for win32cr compilation
            ;;
        esac

    - name: Build release binary
      run: shards build --release

    - name: Detect architecture
      id: detect-arch
      shell: bash
      run: |
        # Detect actual architecture
        arch=$(uname -m)
        case "$arch" in
          x86_64)
            echo "arch=x64" >> $GITHUB_OUTPUT
            ;;
          aarch64|arm64)
            echo "arch=arm64" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "arch=$arch" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Determine binary name
      id: binary-name
      shell: bash
      run: |
        case "${{ matrix.os }}" in
          ubuntu-latest|macos-latest)
            echo "binary_name=keyring" >> $GITHUB_OUTPUT
            ;;
          windows-latest)
            echo "binary_name=keyring.exe" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: keyring-${{ matrix.os }}-${{ steps.detect-arch.outputs.arch }}-${{ matrix.crystal }}
        path: bin/${{ steps.binary-name.outputs.binary_name }}
        retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    name: Create release

    steps:
    - uses: actions/checkout@v4

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false